<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | Order summary card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bg__img"></div>
  <main class="card">
    <img src="/images/illustration-hero.svg" alt="" class="card-img">

    <div class="card-details">
      <h1 class="card-title">Order Summary</h1>
      <p class="card-description">
        You can now listen to millions of songs, audiobooks, and podcasts on any
        device anywhere you like!
      </p>
      <div class="card-plan">
        <img src="/images/icon-music.svg" alt="" class="card-icon">
        <div class="card-purchase">
          <h2 class="plan-type">Annual Plan</h2>
          <p class="plan_price">$59.99/year</p>
        </div>
        <button class="btn btn---link btn--active">Change</button>
      </div>
      <a href="#" class="btn btn--primary">Proceed to Payment</a>
      <a href="#" class="btn btn--secondary">Cancel Order</a>
    </div>
          
    </div>
  </main>
</body>

</html>
